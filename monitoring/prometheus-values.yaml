prometheus:

  prometheusSpec:

    retention: 15d

    scrapeInterval: 15s

    evaluationInterval: 15s

    resources:
      requests:
        memory: "400Mi"
        cpu: "200m"

      limits:
        memory: "2Gi"
        cpu: "1000m"

    storageSpec:

      volumeClaimTemplate:

        spec:

          accessModes: ["ReadWriteOnce"]

          resources:

            requests:

              storage: 20Gi


grafana:

  adminPassword: admin123

  persistence:
    enabled: true
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 128Mi

    limits:
      cpu: 500m
      memory: 512Mi

  service:
    type: ClusterIP


alertmanager:

  alertmanagerSpec:

    storage:

      volumeClaimTemplate:

        spec:

          accessModes: ["ReadWriteOnce"]

          resources:

            requests:

              storage: 10Gi