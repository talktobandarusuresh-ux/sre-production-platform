apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: sre-demo
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/yourrepo/sre-production-platform
    targetRevision: HEAD
    path: kubernetes

  destination:
    server: https://kubernetes.default.svc
    namespace: sre-demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true